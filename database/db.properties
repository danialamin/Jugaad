# =============================================================
# CampusFlex - SQL Server connection configuration
# =============================================================
# Default mode: Windows Authentication (integratedSecurity=true).
# Requires the native auth DLL on java.library.path:
#   lib/auth/mssql-jdbc_auth-12.8.1.x64.dll
# Run lib/auth/download_auth_dll.ps1 once to fetch it.
#
# To switch to SQL authentication instead, set:
#   db.auth=sql
#   db.user=<your_login>
#   db.password=<your_password>
# and remove integratedSecurity=true from db.url.
# =============================================================

db.url=jdbc:sqlserver://localhost:1433;databaseName=campusFlexDb;encrypt=true;trustServerCertificate=true;integratedSecurity=true
db.auth=windows
db.user=
db.password=
